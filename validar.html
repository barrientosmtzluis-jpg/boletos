<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Evento - Realtime DB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div class="container mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">📊 Control de Acceso y Mesas</h1>
            <p class="text-gray-600">Monitoreo en vivo desde Realtime Database</p>
        </header>

        <!-- KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase font-semibold">Total Invitados Llegados</p>
                <p id="kpi-llegados" class="text-3xl font-bold text-gray-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-amber-500">
                <p class="text-sm text-gray-500 uppercase font-semibold">Lugares Libres Restantes (Total)</p>
                <p id="kpi-libres" class="text-3xl font-bold text-gray-800">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-semibold">Mesas en Uso / Totales</p>
                <p id="kpi-mesas" class="text-3xl font-bold text-gray-800">0 / 0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Lista de Invitados -->
            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                    <h2 class="text-xl font-bold">📋 Lista de Invitados</h2>
                    <input type="text" id="buscador" placeholder="Buscar familia o código..." class="border p-2 rounded-lg text-sm w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b text-gray-400 text-sm">
                                <th class="pb-3">Código</th>
                                <th class="pb-3">Familia</th>
                                <th class="pb-3 text-center">Lugares Asignados</th>
                                <th class="pb-3 text-center">Mesa</th>
                                <th class="pb-3 text-center">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-invitados" class="divide-y text-sm">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Distribución de Mesas -->
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <h2 class="text-xl font-bold mb-4">🪑 Distribución y Faltantes por Mesa</h2>
                <div id="contenedor-mesas" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ⚠️ CONFIGURA AQUÍ TUS CREDENCIALES DE FIREBASE
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "xvpau-36eff.firebaseapp.com",
            databaseURL: "https://xvpau-36eff-default-rtdb.firebaseio.com",
            projectId: "xvpau-36eff",
            storageBucket: "xvpau-36eff.appspot.com",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let datosInvitados = {};

        const invitadosRef = ref(db, 'invitados');
        onValue(invitadosRef, (snapshot) => {
            datosInvitados = snapshot.val() || {};
            renderizarDashboard();
        });

        function renderizarDashboard() {
            const filtro = document.getElementById('buscador').value.toLowerCase();
            const tabla = document.getElementById('tabla-invitados');
            const contenedorMesas = document.getElementById('contenedor-mesas');
            
            tabla.innerHTML = '';
            contenedorMesas.innerHTML = '';

            let totalLlegados = 0;
            let totalEsperados = 0;
            let controlMesas = {};

            // 1. Procesar información y agrupar por mesas
            Object.keys(datosInvitados).forEach(codigo => {
                const info = datosInvitados[codigo];
                if (!info) return;

                const familia = info.familia || info.nombre || "Sin Nombre";
                
                // Lectura directa de pase_totales como número
                const pax = Number(info.pase_totales) || 0;
                const mesa = info.mesa || "S/M";
                const llego = info.llego === true || info.asistio === true || info.status === "llegó";

                totalEsperados += pax;
                if (llego) totalLlegados += pax;

                // Estructura para controlar el estado interno de cada mesa
                if (!controlMesas[mesa]) {
                    controlMesas[mesa] = { 
                        totalesAsignados: 0, 
                        ocupados: 0 
                    };
                }
                
                // Sumamos al total planificado de la mesa
                controlMesas[mesa].totalesAsignados += pax;
                // Sumamos al ocupado solo si ya llegó
                if (llego) {
                    controlMesas[mesa].ocupados += pax;
                }

                // Renderizar fila en la tabla con filtro
                if (familia.toLowerCase().includes(filtro) || codigo.toLowerCase().includes(filtro)) {
                    const fila = document.createElement('tr');
                    fila.className = "hover:bg-gray-50 transition-colors";
                    fila.innerHTML = `
                        <td class="py-3 font-mono font-bold text-blue-600">${codigo}</td>
                        <td class="py-3 font-medium">${familia}</td>
                        <td class="py-3 text-center font-semibold">${pax}</td>
                        <td class="py-3 text-center"><span class="bg-gray-100 px-2 py-1 rounded text-xs font-bold">Mesa ${mesa}</span></td>
                        <td class="py-3 text-center">
                            <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${llego ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800'}">
                                ${llego ? '🟢 Accedió' : '⚪ Pendiente'}
                            </span>
                        </td>
                    `;
                    tabla.appendChild(fila);
                }
            });

            // 2. Actualizar KPIs Generales
            document.getElementById('kpi-llegados').innerText = totalLlegados;
            document.getElementById('kpi-libres').innerText = (totalEsperados - totalLlegados);
            document.getElementById('kpi-mesas').innerText = `${Object.keys(controlMesas).filter(m => controlMesas[m].ocupados > 0).length} / ${Object.keys(controlMesas).length}`;

            // 3. Dibujar las tarjetas de las mesas ordenadas numéricamente
            Object.keys(controlMesas).sort((a, b) => {
                if (a === "S/M") return 1;
                if (b === "S/M") return -1;
                return Number(a) - Number(b);
            }).forEach(numMesa => {
                const infoMesa = controlMesas[numMesa];
                const faltantes = infoMesa.totalesAsignados - infoMesa.ocupados;
                
                const mesaDiv = document.createElement('div');
                let colorEstilo = 'bg-gray-50 border-gray-200 text-gray-500';
                
                if (infoMesa.ocupados > 0) {
                    colorEstilo = faltantes === 0 
                        ? 'bg-green-50 border-green-300 text-green-900' 
                        : 'bg-blue-50 border-blue-300 text-blue-900';
                }
                
                mesaDiv.className = `p-4 rounded-xl border ${colorEstilo} shadow-xs flex flex-col justify-between`;
                mesaDiv.innerHTML = `
                    <div>
                        <p class="font-bold text-base text-center border-b pb-1 mb-2">Mesa ${numMesa}</p>
                        <div class="text-xs space-y-1">
                            <p class="flex justify-between"><span>Lugares usados:</span> <strong class="text-sm">${infoMesa.ocupados}</strong></p>
                            <p class="flex justify-between text-gray-400"><span>Total asignados:</span> <span>${infoMesa.totalesAsignados}</span></p>
                        </div>
                    </div>
                    <div class="mt-3 pt-2 border-t border-dashed border-current/20 text-center">
                        <p class="text-xs font-bold ${faltantes > 0 ? 'text-amber-600' : 'text-green-700'}">
                            ${faltantes > 0 ? `⏳ Faltan: ${faltantes} por llegar` : '✅ Mesa Completa'}
                        </p>
                    </div>
                `;
                contenedorMesas.appendChild(mesaDiv);
            });
        }

        document.getElementById('buscador').addEventListener('input', renderizarDashboard);
    </script>
</body>
</html>
