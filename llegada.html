<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción - Registro de Accesos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h1 { color: #4f46e5; margin-bottom: 5px; font-size: 26px; }
        .status-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 20px; }
        .status-pendiente { background: #fef3c7; color: #d97706; }
        .status-parcial { background: #e0f2fe; color: #0369a1; }
        .status-completo { background: #d1fae5; color: #065f46; }
        .data-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: left; }
        .data-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 16px; }
        .data-label { color: #6b7280; font-weight: 500; }
        .data-value { color: #1f2937; font-weight: bold; }
        .highlight { font-size: 22px; color: #4f46e5; }
        input[type="number"] { width: 100px; padding: 10px; font-size: 20px; text-align: center; border: 2px solid #6366f1; border-radius: 8px; margin: 10px 0; font-weight: bold; }
        button { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #059669; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .error-msg { color: #dc2626; font-weight: bold; margin-top: 20px; }
        #loading { font-size: 16px; color: #6b7280; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">Buscando el boleto en la base de datos...</div>
    
    <div id="content" style="display: none;">
        <h1 id="lblFamilia">-</h1>
        <div id="badgeEstado" class="status-badge">Pendiente</div>
        
        <div class="data-box">
            <div class="data-row">
                <span class="data-label">Mesa Asignada:</span>
                <span class="data-value highlight" id="lblMesa">-</span>
            </div>
            <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 10px 0;">
            <div class="data-row">
                <span class="data-label">Pases Totales Asignados:</span>
                <span class="data-value" id="lblTotales">0</span>
            </div>
            <div class="data-row">
                <span class="data-label">Pases Ya Utilizados:</span>
                <span class="data-value" style="color: #ef4444;" id="lblUsados">0</span>
            </div>
            <div class="data-row" style="font-weight: bold; margin-top: 12px; border-top: 1px dashed #ced4da; padding-top: 8px;">
                <span class="data-label" style="color: #16a34a;">Disponibles para Entrar:</span>
                <span class="data-value" style="color: #16a34a; font-size: 20px;" id="lblRestantes">0</span>
            </div>
        </div>

        <div id="actionArea">
            <p style="margin-bottom: 5px; font-weight: bold; color: #374151;">¿Cuántas personas ingresan ahora?</p>
            <input type="number" id="txtAsistencia" min="1" value="1"><br>
            <button id="btnRegistrar" onclick="registrarIngreso()">Confirmar e Ingresar</button>
        </div>
    </div>
</div>

<script>
const FIREBASE_BASE_URL = "https://xvpau-36eff-default-rtdb.firebaseio.com/";
let ticketId = null;
let ticketData = null;

window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    ticketId = urlParams.get('id');
    
    if(!ticketId) {
        document.getElementById('loading').innerHTML = "<p class='error-msg'>Error: ID de boleto no válido.</p>";
        return;
    }
    cargarDatosBoleto();
};

async function cargarDatosBoleto() {
    try {
        let res = await fetch(`${FIREBASE_BASE_URL}invitados/${ticketId}.json`);
        if(res.ok) {
            ticketData = await res.json();
            if(!ticketData) {
                document.getElementById('loading').innerHTML = "<p class='error-msg'>El boleto escaneado no existe.</p>";
                return;
            }
            renderizarInterfaz();
        }
    } catch (e) {
        document.getElementById('loading').innerHTML = "<p class='error-msg'>Error de conexión con Firebase.</p>";
    }
}

function renderizarInterfaz() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    
    document.getElementById('lblFamilia').textContent = ticketData.familia;
    document.getElementById('lblMesa').textContent = ticketData.mesa;
    document.getElementById('lblTotales').textContent = ticketData.pases_totales;
    
    let usados = ticketData.pases_usados || 0;
    document.getElementById('lblUsados').textContent = usados;
    document.getElementById('lblRestantes').textContent = ticketData.pases_restantes;
    
    // Ajustar límites y valores por defecto del input numérico
    let inputAsistencia = document.getElementById('txtAsistencia');
    inputAsistencia.max = ticketData.pases_restantes;
    inputAsistencia.value = ticketData.pases_restantes;

    let badge = document.getElementById('badgeEstado');
    badge.className = "status-badge";
    
    if(ticketData.pases_restantes === 0) {
        badge.textContent = "ACCESO COMPLETADO";
        badge.classList.add("status-completo");
        document.getElementById('actionArea').innerHTML = "<p style='color:#10b981; font-weight:bold; margin-top:15px;'>✓ Todos los pases de este boleto ya ingresaron.</p>";
    } else if (usados > 0 && ticketData.pases_restantes > 0) {
        badge.textContent = "INGRESO PARCIAL";
        badge.classList.add("status-parcial");
    } else {
        badge.textContent = "SIN INGRESAR";
        badge.classList.add("status-pendiente");
    }
}

async function registrarIngreso() {
    let cantIngresa = parseInt(document.getElementById('txtAsistencia').value) || 0;
    
    if(cantIngresa <= 0) {
        return alert("Por favor ingresa un número válido mayor a 0.");
    }
    if(cantIngresa > ticketData.pases_restantes) {
        return alert("Error: Solo quedan " + ticketData.pases_restantes + " pases disponibles.");
    }

    document.getElementById('btnRegistrar').disabled = true;
    document.getElementById('btnRegistrar').textContent = "Guardando en Firebase...";

    // Actualización exacta de los contadores matemáticos
    let nuevosUsados = (ticketData.pases_usados || 0) + cantIngresa;
    let nuevosRestantes = ticketData.pases_totales - nuevosUsados;
    let nuevoEstado = nuevosRestantes === 0 ? "Completado" : "Parcial";

    let updateData = {
        pases_usados: nuevosUsados,
        pases_restantes: nuevosRestantes,
        estado: nuevoEstado
    };

    try {
        let res = await fetch(`${FIREBASE_BASE_URL}invitados/${ticketId}.json`, {
            method: 'PATCH', // Modifica únicamente estas 3 variables sin alterar los demás datos
            body: JSON.stringify(updateData)
        });

        if(res.ok) {
            alert("¡Entrada registrada con éxito!");
            location.reload(); // Recarga la página para refrescar los contadores limpiamente desde Firebase
        } else {
            alert("Error al sincronizar con el servidor.");
            desbloquearBoton();
        }
    } catch(err) {
        alert("Error de conexión a internet.");
        desbloquearBoton();
    }
}

function desbloquearBoton() {
    let btn = document.getElementById('btnRegistrar');
    btn.disabled = false;
    btn.textContent = "Confirmar e Ingresar";
}
</script>
</body>
</html>
