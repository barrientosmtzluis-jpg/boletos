<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción - Control de Entrada</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h1 { color: #4f46e5; margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 20px; }
        .status-pendiente { background: #fef3c7; color: #d97706; }
        .status-parcial { background: #e0f2fe; color: #0369a1; }
        .status-completo { background: #d1fae5; color: #065f46; }
        .data-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: left; }
        .data-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 16px; }
        .data-label { color: #6b7280; font-weight: 500; }
        .data-value { color: #1f2937; font-weight: bold; }
        .highlight { font-size: 20px; color: #4f46e5; }
        input[type="number"] { width: 100px; padding: 10px; font-size: 18px; text-align: center; border: 2px solid #6366f1; border-radius: 8px; margin: 10px 0; }
        button { width: 100%; padding: 14px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #4f46e5; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .error-msg { color: #dc2626; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">Obteniendo información del boleto...</div>
    
    <div id="content" style="display: none;">
        <h1 id="lblFamilia">-</h1>
        <div id="badgeEstado" class="status-badge">Pendiente</div>
        
        <div class="data-box">
            <div class="data-row">
                <span class="data-label">Mesa Asignada:</span>
                <span class="data-value highlight" id="lblMesa">-</span>
            </div>
            <hr style="border: 0; border-top: 1px solid #e5e7eb;">
            <div class="data-row">
                <span class="data-label">Pases Totales:</span>
                <span class="data-value" id="lblTotales">0</span>
            </div>
            <div class="data-row">
                <span class="data-label">Pases Ya Usados:</span>
                <span class="data-value" style="color: #ef4444;" id="lblUsados">0</span>
            </div>
            <div class="data-row" style="font-weight: bold;">
                <span class="data-label" style="color: #10b981;">Disponibles Ahora:</span>
                <span class="data-value" style="color: #10b981; font-size: 18px;" id="lblRestantes">0</span>
            </div>
        </div>

        <div id="actionArea">
            <p style="margin-bottom: 5px; font-weight: 500;">¿Cuántas personas ingresan en este momento?</p>
            <input type="number" id="txtAsistencia" min="1" value="1"><br>
            <button id="btnRegistrar" onclick="registrarIngreso()">Confirmar Entrada</button>
        </div>
    </div>
</div>

<script>
const FIREBASE_BASE_URL = "https://xvpau-36eff-default-rtdb.firebaseio.com/";
let ticketId = null;
let ticketData = null;

// Leer parámetros de la URL al cargar
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    ticketId = urlParams.get('id');
    
    if(!ticketId) {
        document.getElementById('loading').innerHTML = "<p class='error-msg'>Código de boleto inválido o no suministrado.</p>";
        return;
    }
    cargarDatosBoleto();
};

async function cargarDatosBoleto() {
    try {
        let res = await fetch(`${FIREBASE_BASE_URL}invitados/${ticketId}.json`);
        if(res.ok) {
            ticketData = await res.json();
            if(!ticketData) {
                document.getElementById('loading').innerHTML = "<p class='error-msg'>El boleto no existe en la base de datos.</p>";
                return;
            }
            renderizarInterfaz();
        }
    } catch (e) {
        document.getElementById('loading').innerHTML = "<p class='error-msg'>Error de conexión con la base de datos.</p>";
    }
}

function renderizarInterfaz() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    
    document.getElementById('lblFamilia').textContent = ticketData.familia;
    document.getElementById('lblMesa').textContent = ticketData.mesa;
    document.getElementById('lblTotales').textContent = ticketData.pases_totales;
    document.getElementById('lblUsados').textContent = ticketData.pases_usados || 0;
    document.getElementById('lblRestantes').textContent = ticketData.pases_restantes;
    
    // Forzar el máximo permitido en el input según lo que reste disponible
    document.getElementById('txtAsistencia').max = ticketData.pases_restantes;
    document.getElementById('txtAsistencia').value = ticketData.pases_restantes;

    // Actualizar badges visuales de estado
    let badge = document.getElementById('badgeEstado');
    badge.className = "status-badge";
    if(ticketData.pases_restantes === 0) {
        badge.textContent = "ACCESO COMPLETADO";
        badge.classList.add("status-completo");
        document.getElementById('actionArea').innerHTML = "<p style='color:#10b981; font-weight:bold;'>Todo el grupo ha ingresado correctamente.</p>";
    } else if (ticketData.pases_usados > 0 && ticketData.pases_restantes > 0) {
        badge.textContent = "ACCESO PARCIAL";
        badge.classList.add("status-parcial");
    } else {
        badge.textContent = "SIN INGRESAR";
        badge.classList.add("status-pendiente");
    }
}

async function registrarIngreso() {
    let cantIngresa = parseInt(document.getElementById('txtAsistencia').value) || 0;
    
    if(cantIngresa <= 0) {
        return alert("La cantidad a ingresar debe ser mayor a 0.");
    }
    if(cantIngresa > ticketData.pases_restantes) {
        return alert("No puedes ingresar más personas de los pases que restan disponibles (" + ticketData.pases_restantes + ").");
    }

    document.getElementById('btnRegistrar').disabled = true;
    document.getElementById('btnRegistrar').textContent = "Procesando...";

    // Cálculos matemáticos en tiempo real
    let nuevosUsados = (ticketData.pases_usados || 0) + cantIngresa;
    let nuevosRestantes = ticketData.pases_totales - nuevosUsados;
    let nuevoEstado = nuevosRestantes === 0 ? "Completado" : "Parcial";

    // Preparar objeto de actualización parcial para Firebase
    let updateData = {
        pases_usados: nuevosUsados,
        pases_restantes: nuevosRestantes,
        estado: nuevoEstado
    };

    try {
        let res = await fetch(`${FIREBASE_BASE_URL}invitados/${ticketId}.json`, {
            method: 'PATCH', // Usamos PATCH para modificar únicamente esos campos sin tumbar la familia o mesa
            body: JSON.stringify(updateData)
        });

        if(res.ok) {
            alert("¡Ingreso registrado con éxito!");
            // Volver a descargar datos para actualizar la UI limpiamente
            location.reload();
        } else {
            alert("Error al actualizar los datos en la base de datos.");
            document.getElementById('btnRegistrar').disabled = false;
            document.getElementById('btnRegistrar').textContent = "Confirmar Entrada";
        }
    } catch(err) {
        alert("Error de red.");
        document.getElementById('btnRegistrar').disabled = false;
        document.getElementById('btnRegistrar').textContent = "Confirmar Entrada";
    }
}
</script>
</body>
</html>
