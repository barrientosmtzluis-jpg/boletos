<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Panel Profesional</title>
    <style>
        body{font-family:Arial;background:#eef2f7;margin:0}.wrap{max-width:900px;margin:30px auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 10px #0002}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}input,textarea,button{width:100%;padding:10px;margin:6px 0;box-sizing:border-box}button{background:#0a7cff;color:#fff;border:0;border-radius:8px;font-weight:bold;cursor:pointer}.card{border:1px solid #ddd;padding:15px;border-radius:10px}
        h1#nombreEventoHeader { margin-top: 0; color: #0a7cff; border-bottom: 2px solid #eef2f7; padding-bottom: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class='wrap'>
    <h1 id="nombreEventoHeader">Cargando evento...</h1>
    <h2>Panel Profesional de Boletos Electrónicos</h2>
    
    <div class='grid'>
        <div>
            <label>Invitado</label>
            <input id="n" oninput="u()">
            <label>Pases</label>
            <input id="p" type="number" value="1" oninput="u()">
            <label>Mesa</label>
            <input id="m" value='Mesa A' oninput="u()">
            <label>WhatsApp</label>
            <input id="t" placeholder="Ej. 5215512345678">
            <textarea id="msg" rows="12"></textarea>
            <button onclick="s()">Enviar por WhatsApp</button>
        </div>
        <div class='card'>
            <h3>Vista previa</h3>
            <h2 id="tn"></h2>
            <p id="tp"></p>
            <p id="tm"></p>
            <div id="q"></div>
        </div>
    </div>
</div>

<script>
const FIREBASE_URL = "https://xvpau-36eff-default-rtdb.firebaseio.com/configuracion.json";
let nombreEventoGlobal = "Invitación Especial"; 

// Al cargar la página, traemos las variables desde Firebase y caché local
window.addEventListener('DOMContentLoaded', async () => {
    // Intentar cargar rápido del caché local para evitar parpadeos
    let cacheNombre = localStorage.getItem('eventoNombre_cache');
    if (cacheNombre) {
        nombreEventoGlobal = cacheNombre;
        document.getElementById('nombreEventoHeader').textContent = nombreEventoGlobal;
        u();
    }

    try {
        let res = await fetch(FIREBASE_URL);
        if (res.ok) {
            let data = await res.json();
            if (data && data.evento) {
                nombreEventoGlobal = data.evento;
                localStorage.setItem('eventoNombre_cache', data.evento);
                document.getElementById('nombreEventoHeader').textContent = nombreEventoGlobal;
                u(); 
            } else {
                if(!cacheNombre) document.getElementById('nombreEventoHeader').textContent = "Panel de Control";
            }
        }
    } catch (e) {
        console.error("Error cargando variables de Firebase:", e);
        if(!cacheNombre) document.getElementById('nombreEventoHeader').textContent = "Panel de Control";
    }
});

function u(){
    const inputInvitado = document.getElementById('n');
    const inputPases = document.getElementById('p');
    const inputMesa = document.getElementById('m');
    const txtMsg = document.getElementById('msg');
    const divQ = document.getElementById('q');

    let nombreInvitado = inputInvitado.value || 'Invitado';
    let pasesVal = inputPases.value || 1;
    let mesaVal = inputMesa.value || 'Mesa';
    
    document.getElementById('tn').textContent = nombreInvitado;
    document.getElementById('tp').textContent = 'Pases: ' + pasesVal;
    document.getElementById('tm').textContent = 'Mesa: ' + mesaVal;
    
    let baseDir = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
    let url = baseDir + '/boleto.html?invitado=' + encodeURIComponent(nombreInvitado) + '&pases=' + pasesVal + '&mesa=' + encodeURIComponent(mesaVal);
    
    divQ.innerHTML = '';
    new QRCode(divQ, {text: url, width: 160, height: 160});
    
    // REDACCIÓN FORMAL DEL MENSAJE DE WHATSAPP
    txtMsg.value = '✨ *' + nombreEventoGlobal.toUpperCase() + '* ✨\n\n' +
                   'Estimado/a *' + nombreInvitado + '*,\n\n' +
                   'Nos complace enormemente invitarle a compartir con nosotros este momento tan especial e inolvidable.\n\n' +
                   'A continuación, le compartimos los detalles de nuestro evento:\n\n' +
                   '📖 *Invitación Digital:* https://www.qrcreator.dev/es-ES/p/9824EADF\n' +
                   '🌐 *Página Web del Evento:* https://barrientosmtzluis-jpg.github.io/XV-ANAPAU/\n\n' +
                   '━━━━━━━━━━━━━━━━━━━━━━\n' +
                   '🎟️ *SU PASE DIGITAL DE ACCESO*\n' +
                   '• *Pases asignados:* ' + pasesVal + '\n' +
                   '• *Mesa reservada:* ' + mesaVal + '\n\n' +
                   '👉 Descargue su boleto QR indispensable para el acceso aquí:\n' + url + '\n' +
                   '━━━━━━━━━━━━━━━━━━━━━━\n\n' +
                   'Agradecemos de corazón confirmar su asistencia. ¡Le esperamos!';
}

function s(){
    const inputTel = document.getElementById('t');
    const txtMsg = document.getElementById('msg');
    
    if(!inputTel.value) return alert('Capture WhatsApp');
    window.open('https://api.whatsapp.com/send?phone=' + inputTel.value + '&text=' + encodeURIComponent(txtMsg.value), '_blank');
}
</script>
</body>
</html>
