<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Gestor de Eventos XV - Panel</title>
    <style>
        body{font-family:Segoe UI,Tahoma,sans-serif;background:#f0f2f5;margin:0}
        .wrap{max-width:900px;margin:30px auto;background:#fff;padding:25px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:25px}
        @media(max-width:768px){.grid{grid-template-columns:1fr}}
        input,textarea,button{width:100%;padding:12px;margin:8px 0;box-sizing:border-box;border:1px solid #ddd;border-radius:8px}
        button{background:#6366f1;color:#fff;border:0;font-weight:bold;cursor:pointer;transition:0.3s}
        button:hover{background:#4f46e5}
        .btn-success{background:#10b981}
        .btn-success:hover{background:#059669}
        .btn-small{padding:5px 10px; font-size: 12px; width: auto; background:#ef4444;}
        .card{border:1px solid #e5e7eb;padding:20px;border-radius:15px;background:#f9fafb;text-align:center}
        h1{color:#4f46e5;margin-top:0;border-bottom:2px solid #eef2f7;padding-bottom:10px; display:flex; justify-content:space-between; align-items:center}
        #configPanel { padding: 40px; text-align: center; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class='wrap' id="app">
    <div id="configPanel">
        <h2>Configuración del Evento</h2>
        <p style="color:#6b7280; font-size:14px; margin-bottom:20px;">Por favor, ingresa los datos base del evento para habilitar el gestor.</p>
        <input id="cfg_nombre" placeholder="Nombre del Evento (Ej. XV Años de Ana Paula)">
        <input id="cfg_invitados" type="number" placeholder="Cantidad total de invitados esperados">
        <input id="cfg_mesas" type="number" placeholder="Cantidad de mesas">
        <button onclick="configurarEvento()">Guardar y Habilitar Panel</button>
    </div>

    <div id="mainPanel" style="display:none;">
        <h1><span id="titleEvent">Evento</span> <button class="btn-small" onclick="forzarConfiguracion()">Configurar</button></h1>
        <div class='grid'>
            <div>
                <label>Invitado / Familia</label>
                <input id="n" placeholder="Ej. Familia Pérez Mendoza" oninput="u()">
                <label>Pases Totales</label>
                <input id="p" type="number" value="1" oninput="u()">
                <label>Mesa</label>
                <input id="m" value='Mesa A' oninput="u()">
                <button class="btn-success" onclick="registrarInvitadoFirebase()">1. Generar Boleto</button>
                <hr>
                <label>WhatsApp (Ej: 5215512345678)</label>
                <input id="t" placeholder="521...">
                <textarea id="msg" rows="10" placeholder="El mensaje aparecerá aquí..."></textarea>
                <button onclick="s()">2. Enviar por WhatsApp</button>
            </div>
            <div class='card'>
                <h3>Código QR de Acceso</h3>
                <h2 id="tn">-</h2>
                <p id="tp">Pases: -</p>
                <p id="tm">Mesa: -</p>
                <div id="q" style="display:flex; justify-content:center; margin-top:10px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
const FIREBASE_BASE_URL = "https://xvpau-36eff-default-rtdb.firebaseio.com/";

// Bloqueo de Seguridad + Validación de Configuración previa en Firebase
window.onload = async function() {
    // Validar si el usuario pasó por la pantalla de Login primero
    if (sessionStorage.getItem('panel_session_active') !== 'true') {
        alert('Acceso denegado. Por favor inicia sesión.');
        window.location.replace('index.html');
        return;
    }

    try {
        let res = await fetch(`${FIREBASE_BASE_URL}config.json`);
        if (res.ok) {
            const config = await res.json();
            // Si ya hay un evento registrado en Firebase, abre el panel directo
            if (config && config.nombre) {
                iniciarPanel(config);
            } else {
                // Si la BD está en blanco, obliga a configurar la información
                document.getElementById('configPanel').style.display = 'block';
            }
        }
    } catch (error) {
        console.error("Error cargando base de datos:", error);
        document.getElementById('configPanel').style.display = 'block';
    }
};

async function configurarEvento() {
    const nombre = document.getElementById('cfg_nombre').value.trim();
    const inv = document.getElementById('cfg_invitados').value;
    const mesas = document.getElementById('cfg_mesas').value;
    
    if(!nombre || !inv || !mesas) return alert('Por favor completa todos los campos de configuración.');

    const config = { nombre, totalInvitados: inv, totalMesas: mesas };
    
    // Almacena la estructura del evento en Firebase
    await fetch(`${FIREBASE_BASE_URL}config.json`, { method: 'PUT', body: JSON.stringify(config) });
    iniciarPanel(config);
}

function iniciarPanel(data) {
    document.getElementById('configPanel').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';
    document.getElementById('titleEvent').textContent = data.nombre;
}

function forzarConfiguracion() {
    document.getElementById('mainPanel').style.display = 'none';
    document.getElementById('configPanel').style.display = 'block';
}

function u() {
    document.getElementById('tn').textContent = document.getElementById('n').value.trim() || '-';
    document.getElementById('tp').textContent = 'Pases: ' + document.getElementById('p').value;
    document.getElementById('tm').textContent = 'Mesa: ' + document.getElementById('m').value;
}

async function registrarInvitadoFirebase() {
    const name = document.getElementById('n').value.trim();
    if (!name) return alert('Ingrese nombre del invitado.');
    
    const ticketId = "TKT-" + Date.now();
    const pases = document.getElementById('p').value;
    const mesa = document.getElementById('m').value;
    
    const data = { id: ticketId, familia: name, pases: pases, mesa: mesa, estado: "Pendiente" };
    
    let res = await fetch(`${FIREBASE_BASE_URL}invitados/${ticketId}.json`, { method: 'PUT', body: JSON.stringify(data) });
    if (res.ok) {
        alert('Boleto guardado con éxito.');
        actualizarVistaYMensaje(data);
    }
}

function actualizarVistaYMensaje(data) {
    let path = window.location.href.split('/').slice(0, -1).join('/');
    // Envía únicamente el ID correspondiente para que 'llegada.html' lo lea desde Firebase
    let urlBoleto = path + '/boleto.html?id=' + data.id;

    const divQ = document.getElementById('q');
    divQ.innerHTML = '';
    new QRCode(divQ, {text: urlBoleto, width: 160, height: 160});
    
    document.getElementById('msg').value = generarTextoMensaje(data.familia, data.pases, data.mesa, urlBoleto);
}

function generarTextoMensaje(name, pases, mesa, urlBoleto) {
    return '✨ ¡Tenemos una invitación muy especial para ti! ✨\n\n' +
        'Estimada familia / amigo *' + name + '*,\n\n' +
        'Nos complace enormemente invitarte a compartir con nosotros un momento inolvidable.\n\n' +
        '👉 Nuestra Invitación Digital:\nhttps://www.qrcreator.dev/es-ES/p/9824EADF\n\n' +
        '👉 Página WEB del evento:\nhttps://barrientosmtzluis-jpg.github.io/XV-ANAPAU/\n\n' +
        '🎫 Pase Digital válido para ' + pases + ' personas.\n' +
        '📍 Mesa asignada: *' + mesa + '*\n\n' +
        '🔗 Ver tu pase de acceso rápido aquí:\n' + urlBoleto;
}

function s(){
    let tel = document.getElementById('t').value;
    let msg = document.getElementById('msg').value;
    if(!tel || !msg) return alert('Por favor genera el boleto y escribe el teléfono.');
    window.open('https://api.whatsapp.com/send?phone=' + tel + '&text=' + encodeURIComponent(msg), '_blank');
}
</script>
</body>
</html>
