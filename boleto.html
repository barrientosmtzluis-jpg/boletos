<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Pase Digital Inteligente</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:Montserrat,sans-serif;}
        body{background:#f3f4f6;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        .container{width:100%;max-width:400px;}
        .ticket{background:linear-gradient(135deg,#1e3a8a,#0f172a);color:#fff;padding:30px 20px;border-radius:16px;text-align:center;box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);}
        .ticket h3 {text-transform: uppercase; letter-spacing: 2px; font-size: 16px; color: #93c5fd; margin-bottom: 10px;}
        .line {border-top: 2px dashed rgba(255,255,255,0.2); margin: 20px 0;}
        .qr{background:#fff;padding:15px;border-radius:12px;display:inline-block;margin-top:15px;}
        .info-p{font-size: 14px; color: #cbd5e1; margin-bottom: 5px;}
        .alerta-duplicado { background: #ef4444 !important; color: white !important; font-weight: bold; padding: 10px; border-radius: 8px; margin-top: 15px; display: none;}
    </style>
</head>
<body>

<div class="container">
    <div class="card ticket">
        <h3>Pase Digital Inteligente</h3>
        <div class="line"></div>
        
        <div id="alertaPantalla" class="alerta-duplicado">
            ⚠️ ¡ESTE ACCESO YA FUE UTILIZADO!
        </div>

        <p class="info-p" style="margin-top:10px;">Invitación para la familia:</p>
        <h2 id="tNombre" style="color: #f59e0b; margin: 5px 0 15px 0;">Cargando...</h2>
        
        <p class="info-p">Lugares asignados:</p>
        <h2 id="tPases" style="margin-bottom: 15px;">-</h2>
        
        <p class="info-p">Ubicación:</p>
        <strong id="tMesa" style="font-size: 18px; color: #10b981;">-</strong>

        <div class="line"></div>
        <p style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">Presenta este código QR en la entrada</p>
        
        <div class="qr">
            <div id="qrcode"></div>
        </div>
    </div>
</div>

<script>
const NUMERO_CONTROL = "529841174935";
const firebaseConfig = {
  apiKey: "AIzaSyDXy6kz0FsCVdXuDWeeqt7-i6KaDoMJenw",
  authDomain: "xvpau-36eff.firebaseapp.com",
  databaseURL: "https://xvpau-36eff-default-rtdb.firebaseio.com",
  projectId: "xvpau-36eff",
  storageBucket: "xvpau-36eff.firebasestorage.app",
  messagingSenderId: "400516555086",
  appId: "1:400516555086:web:c1db9617e9f5f5c2dd3e1f",
  measurementId: "G-LMHPXZMCNH"
};

let database;
try {
    firebase.initializeApp(firebaseConfig);
    database = firebase.database();
} catch (e) {
    console.error("Error inicializando Firebase: ", e);
    document.getElementById("tNombre").innerText = "Error de Configuración";
}

window.onload = function(){
    if (!database) {
        alert("La base de datos no está lista. Revisa tus credenciales de Firebase.");
        return;
    }

    const urlParams = new URLSearchParams(window.location.search);

    let nombre = urlParams.get("invitado") || "Invitado";
    let pases = parseInt(urlParams.get("pases")) || 1;
    let mesa = urlParams.get("mesa") || "General";

    let boletoId = btoa(encodeURIComponent(nombre + "-" + mesa + "-" + pases)).replace(/=/g,"");

    document.getElementById("tNombre").innerText = nombre;
    document.getElementById("tPases").innerText = pases + (pases == 1 ? " Persona" : " Personas");
    document.getElementById("tMesa").innerText = mesa;

    let enlaceActual = window.location.href;

    database.ref("boletos/" + boletoId)
    .once("value")
    .then(snapshot => {

        if(snapshot.exists()){
            database.ref("inventario_lugares")
            .once("value")
            .then(inv => {
                let restantes = parseInt(inv.val()) || 0;
                document.getElementById("alertaPantalla").style.display = "block";

                generarCodigoQR(
`🚨 DUPLICADO
Familia ${nombre}
Este boleto ya fue utilizado.
Lugares disponibles en sistema: ${restantes}
${enlaceActual}`
                );
            }).catch(err => console.error("Error leyendo inventario secundario: ", err));
            return;
        }

        database.ref("inventario_lugares")
        .transaction(current => {
            let actual = (current === null) ? 200 : parseInt(current);
            if (isNaN(actual)) actual = 0;
            return Math.max(0, actual - pases);
        }, (error, committed, snapshotFinal) => {

            if(error){
                console.error("Error crítico en la transacción: ", error);
                alert("Error al procesar pase en Base de Datos. Revisa las Reglas de Seguridad.");
                return;
            }

            let restantes = parseInt(snapshotFinal.val()) || 0;

            database.ref("boletos/" + boletoId)
            .set({
                invitado: nombre,
                pases: pases,
                mesa: mesa,
                fecha: new Date().toISOString(),
                restantes: restantes
            }).then(() => {
                generarCodigoQR(
`Luis, llegó la familia ${nombre}
Pases: ${pases}
Mesa: ${mesa}
Quedan ${restantes} lugares
${enlaceActual}`
                );
            }).catch(err => console.error("Error guardando registro de boleto: ", err));
        });
    })
    .catch(error => {
        console.error("Error general de Firebase: ", error);
        document.getElementById("tNombre").innerText = "Error de Acceso (Permiso Denegado)";
    });
};

function generarCodigoQR(texto){
    let urlWhatsapp = `https://api.whatsapp.com/send?phone=${NUMERO_CONTROL}&text=${encodeURIComponent(texto)}`;
    let qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML = "";

    try {
        new QRCode(qrContainer,{
            text: urlWhatsapp,
            width: 160,
            height: 160,
            correctLevel: QRCode.CorrectLevel.H
        });
    } catch(e) {
        console.error("Error al construir el elemento QR: ", e);
    }
}
</script>

</body>
</html>
