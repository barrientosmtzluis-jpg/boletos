<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pase Digital - XV Anapau</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background: #f3f4f6; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; }
        
        /* Diseño Premium Estilo Boleto Escuro */
        .ticket { background: linear-gradient(135deg, #1e3a8a, #0f172a); color: #fff; padding: 30px 20px; border-radius: 16px; text-align: center; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4); border: 1px solid #1e40af; }
        .ticket h3 { text-transform: uppercase; letter-spacing: 2px; font-size: 14px; color: #93c5fd; margin-bottom: 5px; }
        .event-title { font-size: 22px; font-weight: 700; color: #f43f5e; margin-bottom: 15px; letter-spacing: 1px; }
        
        .line { border-top: 2px dashed rgba(255,255,255,0.2); margin: 20px 0; }
        .qr { background: #fff; padding: 15px; border-radius: 12px; display: inline-block; margin-top: 15px; }
        
        .info-p { font-size: 13px; color: #cbd5e1; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 24px; font-weight: 700; color: #f59e0b; margin-bottom: 15px; }
        .mesa-value { font-size: 20px; font-weight: 700; color: #10b981; margin-bottom: 15px; }
        
        /* Alerta Dinámica de Pases Agotados */
        .alerta-duplicado { background: #ef4444 !important; color: white !important; font-weight: bold; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; box-shadow: 0 4px 10px rgba(239,68,68,0.3); }
        #msgStatus { font-weight: 600; color: #1e3a8a; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

<div id="msgStatus">Cargando tu pase digital...</div>

<div class="container" id="ticketBlock" style="display: none;">
    <div class="card ticket">
        <div class="event-title">XV AÑOS ANAPAU</div>
        <h3>Pase Digital Inteligente</h3>
        <div class="line"></div>
        
        <div id="alertaPantalla" class="alerta-duplicado">
            ⚠️ ¡ESTE ACCESO YA FUE UTILIZADO TOTALMENTE!
        </div>

        <p class="info-p">Invitación para la familia:</p>
        <div class="info-value" id="tNombre">Cargando...</div>
        
        <p class="info-p">Pases Asignados:</p>
        <h2 id="tPases" style="font-size: 22px; color: #fff; margin-bottom: 15px;">-</h2>
        
        <p class="info-p">Ubicación de Mesa:</p>
        <div class="mesa-value" id="tMesa">-</div>

        <div class="line"></div>
        <p style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">Presenta este código QR en la entrada del salón</p>
        
        <div class="qr">
            <div id="qrcode"></div>
        </div>
        
        <p id="lblDisponibles" style="font-size: 13px; color: #a1a1aa; margin-top: 15px;"></p>
    </div>
</div>

<script>
// URL base unificada de tu Realtime Database
const FIREBASE_BASE_URL = "https://xvpau-36eff-default-rtdb.firebaseio.com/";

window.addEventListener('DOMContentLoaded', async () => {
    // Captura el ID único real (?id=TKT-XXXX) enviado desde el Panel Profesional
    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get('id');

    if (!ticketId) {
        document.getElementById('msgStatus').textContent = "❌ Enlace de pase inválido o ID ausente.";
        return;
    }

    try {
        // Consulta directa al nodo estructurado por tu panel de registro
        let res = await fetch(`${FIREBASE_BASE_URL}invitados/${ticketId}.json`);
        if (!res.ok) throw new Error();
        let data = await res.json();

        if (!data) {
            document.getElementById('msgStatus').textContent = "❌ El boleto no se encuentra registrado en el sistema.";
            return;
        }

        // Inyección de datos en la plantilla de diseño
        document.getElementById("tNombre").innerText = data.familia;
        document.getElementById("tPases").innerText = data.pasesTotales + (data.pasesTotales === 1 ? " Persona" : " Personas");
        document.getElementById("tMesa").innerText = data.mesa || "Mesa A";
        
        const lblDisponibles = document.getElementById("lblDisponibles");

        // LÓGICA DE CONTROL DE ACCESOS DETECTADA EN TIEMPO REAL
        if (data.pasesRestantes <= 0) {
            // Si ya no quedan pases, muestra la alerta roja de duplicado / usado
            document.getElementById("alertaPantalla").style.display = "block";
            lblDisponibles.innerHTML = "🚫 Pases disponibles: <strong style='color:#ef4444;'>0 pases</strong>";
        } else {
            // Si tiene pases activos, muestra cuántos quedan remanentes
            lblDisponibles.innerHTML = "✅ Pases activos en puerta: <strong style='color:#4ade80;'>" + data.pasesRestantes + " pases</strong>";
        }

        // GENERACIÓN DEL QR DE ACCESO REAL
        // Apunta estrictamente a llegada.html con el ID correspondiente para que el staff lo escanee y descuente
        let urlValidacionStaff = 'https://barrientosmtzluis-jpg.github.io/llegada.html?id=' + data.id;
        
        let qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        
        new QRCode(qrContainer, {
            text: urlValidacionStaff,
            width: 160,
            height: 160,
            correctLevel: QRCode.CorrectLevel.H
        });

        // Intercambio de pantallas de carga a boleto listo
        document.getElementById('msgStatus').style.display = 'none';
        document.getElementById('ticketBlock').style.display = 'block';

    } catch (e) {
        console.error(e);
        document.getElementById('msgStatus').textContent = "❌ Error de red al conectar con Firebase.";
    }
});
</script>

</body>
</html>
