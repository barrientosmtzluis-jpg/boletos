<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu Pase Digital Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Montserrat,sans-serif;}
body{background:#f3f4f6;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{width:100%;max-width:400px;}
.ticket{background:linear-gradient(135deg,#1e3a8a,#0f172a);color:#fff;padding:30px 20px;border-radius:16px;text-align:center;box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);}
.ticket h3 {text-transform: uppercase; letter-spacing: 2px; font-size: 16px; color: #93c5fd; margin-bottom: 10px;}
.line {border-top: 2px dashed rgba(255,255,255,0.2); margin: 20px 0;}
.qr{background:#fff;padding:15px;border-radius:12px;display:inline-block;margin-top:15px;}
.info-p{font-size: 14px; color: #cbd5e1; margin-bottom: 5px;}
</style>
</head>
<body>

<div class="container">
    <div class="card ticket">
        <h3>Pase Digital Inteligente</h3>
        <div class="line"></div>
        <p class="info-p">Invitación para la familia:</p>
        <h2 id="tNombre" style="color: #f59e0b; margin: 5px 0 15px 0;">Cargando...</h2>
        
        <p class="info-p">Lugares asignados:</p>
        <h2 id="tPases" style="margin-bottom: 15px;">-</h2>
        
        <p class="info-p">Ubicación:</p>
        <strong id="tMesa" style="font-size: 18px; color: #10b981;">-</strong>

        <div class="line"></div>
        <p style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">Presenta este código QR en la entrada</p>
        
        <div class="qr">
            <div id="qrcode"></div>
        </div>
    </div>
</div>

<script>
// Número de control al que llegará la notificación de asistencia
const NUMERO_CONTROL = "529841174935"; 

window.onload = function() {
    // 1. Obtener parámetros desde la URL
    const urlParams = new URLSearchParams(window.location.search);
    let nombre = urlParams.get("invitado") || "Invitado Extraordinario";
    let pases = urlParams.get("pases") || "1";
    let mesa = urlParams.get("mesa") || "Mesa General";
    let restantes = urlParams.get("restantes") || "0";

    // 2. Pintar los datos en el Boleto HTML
    document.getElementById("tNombre").innerText = nombre;
    document.getElementById("tPases").innerText = pases + (pases == 1 ? " Persona" : " Personas");
    document.getElementById("tMesa").innerText = mesa;

    // 3. Crear el texto de notificación que enviará el QR al ser escaneado
    // El link de este mismo boleto se auto-incluye al final
    let enlaceActual = window.location.href;
    let textoQR = `Luis, ha llegado la familia *${nombre}* (${pases} pases, ${mesa}). Quedan ${restantes} lugares disponibles.\n\nVer Boleto: ${enlaceActual}`;
    
    // URL final para gatillar WhatsApp API
    let urlWhatsAppQR = `https://api.whatsapp.com/send?phone=${NUMERO_CONTROL}&text=${encodeURIComponent(textoQR)}`;

    // 4. Generar el código QR apuntando al WhatsApp definitivo
    try {
        let qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = ""; 
        new QRCode(qrContainer, {
            text: urlWhatsAppQR,
            width: 160,
            height: 160,
            correctLevel: QRCode.CorrectLevel.H // Alta tolerancia para que se escanee fácil desde pantallas
        });
    } catch(e) {
        console.error("Error al generar el QR en el boleto:", e);
    }
};
</script>

</body>
</html>
