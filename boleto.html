<script>
const FIREBASE_BASE_URL = "https://xvpau-36eff-default-rtdb.firebaseio.com/";

window.onload = async function() {
    const urlParams = new URLSearchParams(window.location.search);
    const ticketId = urlParams.get('id');
    
    if(!ticketId) {
        document.getElementById('loading').innerHTML = "<p style='color:red;'>Error: Enlace de pase inválido.</p>";
        return;
    }

    try {
        // 1. Cargar la configuración general del evento
        try {
            let resCfg = await fetch(`${FIREBASE_BASE_URL}config.json`);
            if(resCfg.ok) {
                let config = await resCfg.json();
                if(config && config.nombre) {
                    document.getElementById('evtName').textContent = config.nombre.toUpperCase();
                }
            }
        } catch (cfgError) {
            console.warn("No se pudo cargar la configuración del evento, usando nombre por defecto.", cfgError);
        }

        // 2. Cargar datos específicos del boleto
        let resTkt = await fetch(`${FIREBASE_BASE_URL}invitados/${ticketId}.json`);
        
        // Si Firebase responde con un error de permisos o ruta inválida
        if(!resTkt.ok) {
            document.getElementById('loading').innerHTML = `<p style='color:red;'>Error del servidor (${resTkt.status}). Verifica las reglas de tu base de datos.</p>`;
            return;
        }

        let data = await resTkt.json();
        if(!data) {
            document.getElementById('loading').innerHTML = "<p style='color:red;'>El pase digital no existe o fue cancelado.</p>";
            return;
        }

        // Ocultar "cargando" y mostrar pase
        document.getElementById('loading').style.display = 'none';
        document.getElementById('ticket').style.display = 'block';

        // Inyectar datos en la interfaz de forma segura
        document.getElementById('lblFamilia').textContent = data.familia || "Invitado Especial";
        document.getElementById('lblMesa').textContent = data.mesa || "Por asignar";
        document.getElementById('lblTotales').textContent = data.pases_totales || 0;
        document.getElementById('lblUsados').textContent = data.pases_usados || 0;
        
        // Calcular restantes en JS por si no viene en la base de datos
        let pasesTotales = parseInt(data.pases_totales) || 0;
        let pasesUsados = parseInt(data.pases_usados) || 0;
        let pasesRestantes = data.pases_restantes !== undefined ? data.pases_restantes : (pasesTotales - pasesUsados);
        
        document.getElementById('lblRestantes').textContent = pasesRestantes;

        // Manejar banners de estado visuales para el invitado
        let badge = document.getElementById('badgeEstado');
        if(pasesRestantes <= 0) {
            badge.textContent = "TODOS LOS PASES UTILIZADOS";
            badge.className = "status-banner status-completo";
        } else if(pasesUsados > 0) {
            badge.textContent = "ACCESO PARCIAL REGISTRADO";
            badge.className = "status-banner status-parcial";
        } else {
            badge.textContent = "PASE VÁLIDO PARA INGRESAR";
            badge.className = "status-banner status-pendiente";
        }

        // Generar el código QR dinámico usando ticketId de la URL (CORREGIDO)
        let path = window.location.href.split('/').slice(0, -1).join('/');
        let urlLlegada = path + '/llegada.html?id=' + ticketId; // <- CAMBIADO: data.id por ticketId
        
        // Limpiar contenedor por si acaso y generar QR
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { 
            text: urlLlegada, 
            width: 150, 
            height: 150 
        });

    } catch(e) {
        console.error(e);
        document.getElementById('loading').innerHTML = "<p style='color:red;'>Error de conexión o de lectura al cargar el boleto.</p>";
    }
};
</script>
