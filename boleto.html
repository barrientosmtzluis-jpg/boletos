<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pase Digital - XV Anapau</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .ticket { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; border: 2px dashed #38bdf8; }
        h1 { font-size: 20px; color: #38bdf8; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        .event-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #f43f5e; }
        .info { background: #0f172a; padding: 15px; border-radius: 12px; margin: 20px 0; text-align: left; }
        .info p { margin: 8px 0; font-size: 16px; color: #94a3b8; }
        .info strong { color: #fff; }
        .qr-container { background: #fff; padding: 15px; border-radius: 12px; display: inline-block; margin-top: 10px; }
        .footer-msg { font-size: 13px; color: #64748b; margin-top: 20px; line-height: 1.4; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="ticket" id="ticketBlock" style="display: none;">
    <div class="event-title" id="evtName">XV AÑOS ANAPAU</div>
    <h1>🎟️ Pase Digital de Acceso</h1>
    
    <div class="info">
        <p>👪 Invitado: <strong id="lblFam">-</strong></p>
        <p>🪑 Mesa Asignada: <strong id="lblMsa">-</strong></p>
        <p>🎟️ Pases Totales: <strong id="lblTot">-</strong></p>
        <p>🔄 Disponibles en Puerta: <strong id="lblRest" style="color: #4ade80;">-</strong></p>
    </div>

    <p style="font-size: 14px; color: #94a3b8;">Presenta este código QR en la entrada:</p>
    <div class="qr-container">
        <div id="qrcode"></div>
    </div>

    <div class="footer-msg">
        *Este pase es personal e intransferible.<br>Al ingresar se deducirán los pases correspondientes.
    </div>
</div>

<div id="msgStatus">Cargando tu pase digital...</div>

<script>
const FIREBASE_BASE_URL = "https://xvpau-36eff-default-rtdb.firebaseio.com/";

window.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
        document.getElementById('msgStatus').textContent = "❌ Enlace de pase inválido.";
        return;
    }

    try {
        let res = await fetch(`${FIREBASE_BASE_URL}invitados/${id}.json`);
        if (!res.ok) throw new Error();
        let data = await res.json();

        if (!data) {
            document.getElementById('msgStatus').textContent = "❌ El boleto no se encuentra registrado.";
            return;
        }

        // Rellenar datos
        document.getElementById('lblFam').textContent = data.familia;
        document.getElementById('lblMsa').textContent = data.mesa || 'Mesa A';
        document.getElementById('lblTot').textContent = data.pasesTotales;
        document.getElementById('lblRest').textContent = data.pasesRestantes + " pases";

        // Generar QR apuntando estrictamente a la pantalla de validación (llegada.html)
        let linkValidacion = 'https://barrientosmtzluis-jpg.github.io/XV-ANAPAU/llegada.html?id=' + data.id;
        new QRCode(document.getElementById("qrcode"), { text: linkValidacion, width: 180, height: 180 });

        // Cambiar visibilidad
        document.getElementById('msgStatus').style.display = 'none';
        document.getElementById('ticketBlock').style.display = 'block';

    } catch (e) {
        document.getElementById('msgStatus').textContent = "❌ Error al cargar los datos del boleto.";
    }
});
</script>
</body>
</html>
