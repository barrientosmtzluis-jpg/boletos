<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Invitaciones</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Montserrat,sans-serif;}

body{
background:#f3f4f6;
padding:20px;
}

.container{max-width:900px;margin:auto;}

header{text-align:center;margin-bottom:20px;}

.layout{display:flex;gap:20px;flex-wrap:wrap;}

.card{
background:#fff;
padding:20px;
border-radius:12px;
flex:1;
min-width:300px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#25d366;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

.ticket{
background:linear-gradient(135deg,#1e3a8a,#0f172a);
color:#fff;
padding:20px;
border-radius:16px;
text-align:center;
}

.qr{background:#fff;padding:10px;border-radius:10px;display:inline-block;margin-top:10px;}

.login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#f3f4f6;
}

.login-box{
background:#fff;
padding:25px;
border-radius:12px;
width:300px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<div class="login-box">
<h3>Acceso</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<p id="error" style="color:red"></p>
</div>
</div>

<!-- PANEL -->
<div id="panel" class="container" style="display:none">

<header>
<h2>Panel de Invitaciones</h2>
</header>

<div class="layout">

<!-- FORM -->
<div class="card">
<h3>Datos</h3>

<p>Lugares: <span id="lugares">200</span></p>

<input id="nombre" oninput="update()">
<input id="pases" type="number" oninput="update()" value="1">
<input id="mesa" oninput="update()" value="Mesa 1">
<input id="tel" placeholder="521...">

<textarea id="msg"></textarea>

<button onclick="send()">Enviar WhatsApp</button>
</div>

<!-- TICKET -->
<div class="card ticket">

<h3>Pase Digital</h3>

<p id="tNombre">Invitado</p>
<p id="tPases">1</p>
<p id="tMesa">Mesa 1</p>

<div class="qr">
<div id="qrcode"></div>
</div>

</div>

</div>
</div>

<script>

const USER="administrador";
const PASS="XVPau";
const TOTAL=200;

/* LOGIN */
function login(){
const u=document.getElementById("user").value.trim();
const p=document.getElementById("pass").value.trim();

if(u===USER && p===PASS){
sessionStorage.setItem("ok","1");
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
init();
}else{
document.getElementById("error").innerText="Error de acceso";
}
}

/* INIT */
function init(){
if(!localStorage.getItem("lugares")){
localStorage.setItem("lugares",TOTAL);
}
mostrar();
update();
}

/* ON LOAD */
window.onload=function(){

const url=new URLSearchParams(location.search);

if(url.get("invitado")){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

document.getElementById("nombre").value=url.get("invitado");
document.getElementById("pases").value=url.get("pases");
document.getElementById("mesa").value=url.get("mesa")||"General";

init();
return;
}

if(sessionStorage.getItem("ok")==="1"){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
init();
}
};

/* LUGARES */
function mostrar(){
let l=localStorage.getItem("lugares");
if(!l){l=TOTAL;localStorage.setItem("lugares",TOTAL);}
document.getElementById("lugares").innerText=l;
}

/* UPDATE TICKET */
function update(){

let n=document.getElementById("nombre").value;
let p=document.getElementById("pases").value;
let m=document.getElementById("mesa").value;

document.getElementById("tNombre").innerText=n;
document.getElementById("tPases").innerText=p;
document.getElementById("tMesa").innerText=m;

/* QR seguro */
try{
let url="https://wa.me/521000000000?text="+encodeURIComponent(n+" "+p+" "+m);

document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),url);

}catch(e){
console.log("QR error",e);
}

document.getElementById("msg").value=
`Invitación para ${n}, ${p} personas, ${m}`;
}

/* SEND */
function send(){

let tel=document.getElementById("tel").value;
let p=parseInt(document.getElementById("pases").value);
let l=parseInt(localStorage.getItem("lugares"));

if(l-p<0 && !confirm("No hay suficientes lugares")) return;

localStorage.setItem("lugares",l-p);
mostrar();

let msg=document.getElementById("msg").value;

window.open(
`https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msg)}`
);

}

</script>

</body>
</html>
