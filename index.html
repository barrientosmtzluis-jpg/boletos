<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Panel Profesional</title><style>
body{font-family:Arial;background:#eef2f7;margin:0}.wrap{max-width:900px;margin:30px auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 10px #0002}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}input,textarea,button{width:100%;padding:10px;margin:6px 0}button{background:#0a7cff;color:#fff;border:0;border-radius:8px}.card{border:1px solid #ddd;padding:15px;border-radius:10px}
</style><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script></head><body>
<div class='wrap'><h2>Panel Profesional de Boletos Electrónicos</h2><div class='grid'>
<div><label>Invitado</label><input id=n oninput=u()><label>Pases</label><input id=p type=number value=1 oninput=u()><label>Mesa</label><input id=m value='Mesa A' oninput=u()><label>WhatsApp</label><input id=t><textarea id=msg rows=8></textarea><button onclick=s()>Enviar por WhatsApp</button></div>
<div class='card'><h3>Vista previa</h3><h2 id=tn></h2><p id=tp></p><p id=tm></p><div id=q></div></div></div></div>
<script>
function u(){let n=nombre=n.value||'Invitado',p=pases.value||1,m=mesa.value||'Mesa';tn.textContent=n;tp.textContent='Pases: '+p;tm.textContent='Mesa: '+m;let url='boleto.html?invitado='+encodeURIComponent(n)+'&pases='+p+'&mesa='+encodeURIComponent(m);q.innerHTML='';new QRCode(q,{text:url,width:160,height:160});msg.value='🎫 Invitación\n'+n+'\nPases:'+p+'\nMesa:'+m+'\n'+url;}
let nombre=n,pases=p,mesa=m;u();
function s(){if(!t.value)return alert('Capture WhatsApp');window.open('https://api.whatsapp.com/send?phone='+t.value+'&text='+encodeURIComponent(msg.value),'_blank')}
</script></body></html>
