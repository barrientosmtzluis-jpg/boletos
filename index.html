<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Invitaciones</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:Montserrat,sans-serif;}

        body{
            background:#f3f4f6;
            padding:20px;
        }

        .container{max-width:900px;margin:auto;}

        header{text-align:center;margin-bottom:20px;}

        .layout{display:flex;gap:20px;flex-wrap:wrap;}

        .card{
            background:#fff;
            padding:20px;
            border-radius:12px;
            flex:1;
            min-width:300px;
        }

        label{
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            display: block;
            margin-top: 10px;
        }

        input,textarea{
            width:100%;
            padding:10px;
            margin:5px 0 10px 0;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .counter-section {
            background: #eff6ff;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #bfdbfe;
            margin-bottom: 15px;
        }

        .counter-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 5px;
        }

        .counter-inputs input {
            margin: 0;
            font-weight: bold;
            color: #2563eb;
            text-align: center;
        }

        .btn-reset {
            background: #6b7280;
            padding: 10px;
            font-size: 12px;
            width: auto;
            white-space: nowrap;
        }

        button{
            width:100%;
            padding:12px;
            background:#25d366;
            color:#fff;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .ticket{
            background:linear-gradient(135deg,#1e3a8a,#0f172a);
            color:#fff;
            padding:20px;
            border-radius:16px;
            text-align:center;
        }

        .qr{background:#fff;padding:10px;border-radius:10px;display:inline-block;margin-top:10px;}
    </style>
</head>

<body>

<div id="panel" class="container">
    <header>
        <h2>Panel de Invitaciones</h2>
    </header>

    <div class="layout">
        <div class="card">
            <h3>Datos</h3>

            <div class="counter-section">
                <label style="margin-top:0; color:#1e40af;">Lugares Disponibles en Sistema:</label>
                <div class="counter-inputs">
                    <input id="lugares" type="number" oninput="cambiarLugaresManual(this.value)" min="0" value="200">
                    <button type="button" class="btn-reset" id="btnReiniciar" onclick="reiniciarContador()">
                        <i class="fas fa-undo"></i> Reiniciar (200)
                    </button>
                </div>
            </div>

            <label>Nombre del Invitado:</label>
            <input id="nombre" oninput="update()" placeholder="Ej. Familia Pérez">

            <label>Número de pases / lugares:</label>
            <input id="pases" type="number" oninput="update()" value="1" min="1">

            <label>Mesa asignada:</label>
            <input id="mesa" oninput="update()" value="Mesa 1">

            <label>WhatsApp (Sin signos ni espacios):</label>
            <input id="tel" placeholder="521...">

            <label>Vista previa del mensaje:</label>
            <textarea id="msg" rows="10"></textarea>

            <button onclick="send()"><i class="fab fa-whatsapp"></i> Enviar WhatsApp</button>
        </div>

        <div class="card ticket">
            <h3>Pase Digital</h3>
            <br>
            <p>Invitación para:</p>
            <h2 id="tNombre" style="color: #f59e0b; margin: 10px 0;">Invitado</h2>
            <p>Lugares: <strong id="tPases">1</strong></p>
            <p>Asiento: <strong id="tMesa">Mesa 1</strong></p>

            <div class="qr">
                <div id="qrcode"></div>
            </div>
        </div>
    </div>
</div>

<script>
// 1. CONFIGURACIÓN DE FIREBASE
// Reemplaza estos datos con las credenciales de tu proyecto de Firebase
const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROYECTO.firebaseapp.com",
    databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
    projectId: "TU_PROYECTO",
    storageBucket: "TU_PROYECTO.appspot.com",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const TOTAL_DEFECTO = 200;

// 2. ESCUCHADOR EN TIEMPO REAL
// Sincroniza el input y el botón con el valor real en Firebase de forma inmediata
database.ref("inventario_lugares").on("value", function(snapshot) {
    let cantidadActual = snapshot.val();
    
    // Si la referencia no existe aún en Firebase, inicializarla con el valor por defecto
    if (cantidadActual === null) {
        database.ref("inventario_lugares").set(TOTAL_DEFECTO);
        cantidadActual = TOTAL_DEFECTO;
    }
    
    document.getElementById("lugares").value = cantidadActual;
    document.getElementById("btnReiniciar").innerHTML = `<i class="fas fa-undo"></i> Reiniciar (${cantidadActual})`;
});

// 3. FUNCIONES DE FLUJO Y CONTROL
function cambiarLugaresManual(valor){
    let cantidad = parseInt(valor);

    if(isNaN(cantidad) || cantidad < 0){
        cantidad = 0;
    }

    // Envía el cambio inmediato a Firebase
    database.ref("inventario_lugares").set(cantidad);
}

function reiniciarContador(){
    // Restablece Firebase al valor por defecto (200) o al valor que captures del input actual
    database.ref("inventario_lugares").set(TOTAL_DEFECTO);
    alert("Contador reiniciado en Firebase a " + TOTAL_DEFECTO);
}

function update(){
    let n = document.getElementById("nombre").value || "Invitado";
    let p = document.getElementById("pases").value || "1";
    let m = document.getElementById("mesa").value || "Mesa 1";

    document.getElementById("tNombre").innerText = n;
    document.getElementById("tPases").innerText = p;
    document.getElementById("tMesa").innerText = m;

    let urlBoleto = `https://barrientosmtzluis-jpg.github.io/boletos/boleto.html?invitado=${encodeURIComponent(n)}&pases=${p}&mesa=${encodeURIComponent(m)}`;

    let qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML = "";

    new QRCode(qrContainer,{
        text:urlBoleto,
        width:128,
        height:128
    });

    document.getElementById("msg").value =
`✨ ¡Tenemos una invitación muy especial para ti! ✨

Familia ${n}

🎫 Pase válido para ${p} personas
📍 ${m}

Tu boleto:

${urlBoleto}`;
}

function send(){
    let tel = document.getElementById("tel").value.trim();

    if(!tel){
        alert("Ingrese un teléfono");
        return;
    }

    let msg = document.getElementById("msg").value;

    window.open(
        `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msg)}`,
        "_blank"
    );
}

// Ejecución inicial de vista previa al cargar la página
update();
</script>

</body>
</html>
