<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Invitaciones</title>

<link href="https://googleapis.com" rel="stylesheet">
<link rel="stylesheet" href="https://cloudflare.com">
<script src="https://cloudflare.com"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Montserrat,sans-serif;}

body{
background:#f3f4f6;
padding:20px;
}

.container{max-width:900px;margin:auto;}

header{text-align:center;margin-bottom:20px;}

.layout{display:flex;gap:20px;flex-wrap:wrap;}

.card{
background:#fff;
padding:20px;
border-radius:12px;
flex:1;
min-width:300px;
}

label{
font-size: 13px;
font-weight: 600;
color: #4b5563;
display: block;
margin-top: 10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0 10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#25d366;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight: bold;
}

.ticket{
background:linear-gradient(135deg,#1e3a8a,#0f172a);
color:#fff;
padding:20px;
border-radius:16px;
text-align:center;
}

.qr{background:#fff;padding:10px;border-radius:10px;display:inline-block;margin-top:10px;}
</style>
</head>

<body>

<div id="panel" class="container">

<header>
<h2>Panel de Invitaciones</h2>
</header>

<div class="layout">

<div class="card">
<h3>Datos</h3>

<div style="background: #eff6ff; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #2563eb;">
    <label style="margin-top:0;">Capacidad Total del Evento:</label>
    <input id="totalEvento" type="number" oninput="cambiarCapacidad()" value="200" min="1" style="margin-bottom:5px;">
    <p style="font-weight: bold; color: #2563eb; margin-top: 5px;">Lugares Disponibles: <span id="lugares">200</span></p>
</div>

<label>Nombre del Invitado:</label>
<input id="nombre" oninput="update()" placeholder="Ej. Familia Pérez">

<label>Número de pases / lugares:</label>
<input id="pases" type="number" oninput="update()" value="1" min="1">

<label>Mesa asignada:</label>
<input id="mesa" oninput="update()" value="Mesa 1">

<label>WhatsApp (Sin signos ni espacios):</label>
<input id="tel" placeholder="521...">

<label>Vista previa del mensaje:</label>
<textarea id="msg" rows="10"></textarea>

<button onclick="send()"><i class="fab fa-whatsapp"></i> Enviar WhatsApp</button>
</div>

<div class="card ticket">
<h3>Pase Digital</h3>
<br>
<p>Invitación para:</p>
<h2 id="tNombre" style="color: #f59e0b; margin: 10px 0;">Invitado</h2>
<p>Lugares: <strong id="tPases">1</strong></p>
<p>Asiento: <strong id="tMesa">Mesa 1</strong></p>

<div class="qr">
<div id="qrcode"></div>
</div>

</div>

</div>
</div>

<script>
/* INIT */
function init(){
if(!localStorage.getItem("totalOriginal")){
localStorage.setItem("totalOriginal", "200");
}
if(!localStorage.getItem("lugares")){
localStorage.setItem("lugares", "200");
}

document.getElementById("totalEvento").value = localStorage.getItem("totalOriginal");
mostrar();
update();
}

/* ON LOAD */
window.onload=function(){
const url=new URLSearchParams(location.search);

if(url.get("invitado")){
document.getElementById("nombre").value=url.get("invitado") || "";
document.getElementById("pases").value=url.get("pases") || "1";
document.getElementById("mesa").value=url.get("mesa")||"General";
}

init();
};

/* LUGARES */
function mostrar(){
document.getElementById("lugares").innerText = localStorage.getItem("lugares");
}

/* CAMBIAR CAPACIDAD TOTAL */
function cambiarCapacidad(){
let nuevoTotal = parseInt(document.getElementById("totalEvento").value) || 0;
let viejoTotal = parseInt(localStorage.getItem("totalOriginal")) || 0;
let lugaresActuales = parseInt(localStorage.getItem("lugares")) || 0;

// Calcular la diferencia para no borrar los lugares que ya se restaron previamente
let diferencia = nuevoTotal - viejoTotal;
let nuevosLugaresDisponibles = lugaresActuales + diferencia;

if(nuevosLugaresDisponibles < 0) nuevosLugaresDisponibles = 0;

localStorage.setItem("totalOriginal", nuevoTotal);
localStorage.setItem("lugares", nuevosLugaresDisponibles);
mostrar();
}

/* UPDATE */
function update(){
let n=document.getElementById("nombre").value || "Invitado";
let p=document.getElementById("pases").value || "1";
let m=document.getElementById("mesa").value || "Mesa 1";

document.getElementById("tNombre").innerText=n;
document.getElementById("tPases").innerText=p;
document.getElementById("tMesa").innerText=m;

let urlBoleto = `https://github.io{encodeURIComponent(n)}&pases=${p}&mesa=${encodeURIComponent(m)}`;

try{
document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"), {
    text: urlBoleto,
    width: 128,
    height: 128
});
}catch(e){
console.log(e);
}

let mensajeFormateado = "✨ ¡Tenemos una invitación muy especial para ti! ✨\n\n" +
`Estimada familia / amigo *${n}*,\n\n` +
"Nos complace enormemente invitarte a compartir con nosotros un momento inolvidable. En el siguiente enlace podrás conocer todos los detalles de nuestro evento, itinerario y locación:\n\n" +
"👉 Nuestra Invitación Digital:\n" +
"https://github.io\n\n" +
`🎫 De igual manera, te hacemos llegar tu Pase Digital Inteligente válido para *${p}* personas.\n` +
`📍 Mesa asignada: *${m}*\n\n` +
"Para ingresar de forma ágil el día del evento, solo haz clic aquí abajo y presenta el código QR desde tu pantalla:\n\n" +
"👉 Tu Boleto de Acceso:\n" +
urlBoleto + "\n\n" +
"¡Tu presencia hará que este día sea aún más especial! Esperamos contar contigo. ✨🥂";

document.getElementById("msg").value = mensajeFormateado;
}

/* SEND */
function send(){
let tel=document.getElementById("tel").value.trim();
let p=parseInt(document.getElementById("pases").value) || 0;
let l=parseInt(localStorage.getItem("lugares"));

if(!tel){
    alert("Por favor, introduce un número de teléfono válido.");
    return;
}

if(l-p<0){
    if(!confirm("No hay suficientes lugares disponibles. ¿Deseas continuar?")) return;
}

localStorage.setItem("lugares", l-p);
mostrar();

let msg = document.getElementById("msg").value;

window.open(
`https://whatsapp.com{tel}&text=${encodeURIComponent(msg)}`, 
'_blank'
);
}
</script>

</body>
</html>
