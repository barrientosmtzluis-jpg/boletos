<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - Pixelink Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            /* Fondo con sutil degradado que emula la transición del logotipo */
            background: linear-gradient(135deg, #f0f4f8 0%, #e1e9f3 100%); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        .login-card { 
            background: #fff; 
            padding: 40px 30px 30px 30px; 
            border-radius: 16px; 
            /* Sombra profunda y suave con el tono azul marino corporativo del logo */
            box-shadow: 0 10px 30px rgba(11, 30, 63, 0.08); 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            box-sizing: border-box; 
            margin-bottom: 25px; 
            border: 1px solid rgba(11, 30, 63, 0.03);
        }

        /* Contenedor optimizado para el logotipo de Pixelink */
        .brand-logo {
            width: 100%;
            max-width: 220px;
            height: auto;
            margin-bottom: 25px;
        }

        h2 { 
            color: #0b1e3f; /* Azul Marino Corporativo del logotipo */
            margin-top: 0; 
            margin-bottom: 25px; 
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        label { 
            display: block; 
            text-align: left; 
            font-weight: 600; 
            color: #4b5563; 
            margin-bottom: 8px; 
            font-size: 14px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 20px; 
            border: 1.5px solid #d1d5db; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            text-align: center; 
            color: #0b1e3f;
            transition: all 0.2s ease;
            background-content: #fcfdfe;
        }

        input:focus {
            border-color: #00a4ba; /* Color Cian extraído del logotipo */
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 164, 186, 0.15);
            background: #fff;
        }

        button { 
            /* Degradado premium dinámico basado en los colores del isotipo */
            background: linear-gradient(135deg, #0054a6 0%, #00a4ba 100%); 
            color: #fff; 
            border: 0; 
            padding: 14px; 
            border-radius: 8px; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s; 
            box-shadow: 0 4px 12px rgba(0, 84, 166, 0.25);
        }

        button:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 84, 166, 0.35);
            opacity: 0.95;
        }

        button:active {
            transform: translateY(1px);
        }

        .error-msg { 
            color: #e11d48; /* Color Rosa/Rojo de advertencia balanceado con el logo */
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 20px; 
            display: none; 
            background: #fff1f2;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ffe4e6;
        }
        
        /* Enlace de Olvidé Contraseña alineado al acento Rosa/Naranja del logo */
        .forgot-password { 
            display: inline-block; 
            margin-top: 20px; 
            color: #6b7280; 
            font-size: 13.5px; 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.2s; 
        }

        .forgot-password:hover { 
            color: #e04868; /* Tono magenta/rosa de la transición del logotipo */
            text-decoration: underline; 
        }

        /* Estilos del Footer Corporativo - PIXELINK Invitaciones */
        .brand-footer { 
            text-align: center; 
            max-width: 360px; 
            width: 100%; 
            color: #6b7280; 
            font-size: 12.5px; 
            line-height: 1.6; 
        }

        .brand-footer .created-by { 
            font-size: 14px; 
            font-weight: bold; 
            color: #0b1e3f; 
            margin-bottom: 6px; 
            letter-spacing: 0.5px; 
        }

        .brand-footer .created-by span { 
            background: linear-gradient(135deg, #0054a6, #00a4ba);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-footer .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 18px; 
            margin: 12px 0; 
        }

        .brand-footer .social-links a { 
            color: #0b1e3f; 
            font-size: 18px; 
            transition: color 0.2s, transform 0.2s; 
            text-decoration: none; 
        }

        .brand-footer .social-links a:hover { 
            color: #00a4ba; 
            transform: scale(1.1);
        }

        .brand-footer .contact-info { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            font-size: 12px; 
        }

        .brand-footer .contact-info a { 
            color: #4b5563; 
            text-decoration: none; 
            font-weight: 500;
        }

        .brand-footer .contact-info a:hover { 
            color: #0054a6;
            text-decoration: underline; 
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="Captura de pantalla 2026-06-15 165755.png" alt="Pixelink Invitaciones" class="brand-logo">
    
    <h2>Control de Acceso</h2>
    <div id="error" class="error-msg">⚠️ Contraseña incorrecta</div>
    
    <form onsubmit="validarAcceso(event)">
        <label for="password">Contraseña de Administrador</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <button type="submit">Ingresar al Panel</button>
    </form>

    <a href="#" class="forgot-password" onclick="recuperarPassword(event)">
        <i class="fa-brands fa-whatsapp"></i> ¿Olvidaste tu contraseña?
    </a>
</div>

<footer class="brand-footer">
    <div class="created-by">Desarrollado por <span>PIXELINK</span></div>
    <div style="padding: 0 10px;">Sistemas de control de accesos, invitaciones digitales inteligentes y plataformas de gestión de eventos.</div>
    
    <div class="social-links">
        <a href="#" target="_blank" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
        <a href="#" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" target="_blank" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>
        <a href="https://wa.me/529841174935" target="_blank" title="WhatsApp Corporativo"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <div class="contact-info">
        <div><i class="fa-solid fa-envelope"></i> <a href="mailto:contacto@pixelink.com">contacto@pixelink.com</a></div>
        <div><i class="fa-solid fa-phone"></i> <a href="tel:+529841174935">+52 984 117 4935</a></div>
        <div style="margin-top: 8px; font-size: 11px; color: #9ca3af;">&copy; 2026 PIXELINK. Todos los derechos reservados.</div>
    </div>
</footer>

<script>
// CONTRASEÑA DE ACCESO LOCAL AL PANEL
const CLAVE_CORRECTA = "Anapau2026*Secret"; 

function validarAcceso(event) {
    event.preventDefault();
    const inputPass = document.getElementById('password').value;
    const errorDiv = document.getElementById('error');

    if (inputPass === CLAVE_CORRECTA) {
        errorDiv.style.display = 'none';
        sessionStorage.setItem('panel_session_active', 'true');
        // Redirecciona de forma limpia eliminando el historial de login inmediato
        window.location.replace('panel.html');
    } else {
        errorDiv.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
    }
}

function recuperarPassword(event) {
    event.preventDefault();
    
    const numeroSoporte = "529841174935";
    const mensajeSoporte = "Hola PIXELINK, requiero asistencia técnica. Olvidé la contraseña de administrador para ingresar al Panel Profesional de Boletos Electrónicos. ¿Podrían asistirme con la verificación?";
    
    window.open('https://api.whatsapp.com/send?phone=' + numeroSoporte + '&text=' + encodeURIComponent(mensajeSoporte), '_blank');
}
</script>

</body>
</html>
