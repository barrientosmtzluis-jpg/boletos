<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración del Evento</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f7; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input { width: 100%; padding: 10px; margin: 6px 0 15px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #0a7cff; color: #fff; border: 0; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0066d6; }
        
        /* Clase para ocultar contenedores dinámicamente */
        .oculto { display: none !important; }
    </style>
</head>
<body>

<div class="card" id="vistaLogin">
    <h2>Acceso al Sistema</h2>
    
    <label>Usuario</label>
    <input type="text" id="loginUsuario" placeholder="Ej. Administrador">
    
    <label>Contraseña</label>
    <input type="password" id="loginPassword" placeholder="••••••••">
    
    <button onclick="validarAcceso()">Iniciar Sesión</button>
</div>

<div class="card oculto" id="vistaConfiguracion">
    <h2>Configuración de Evento</h2>
    
    <label>Nombre del Evento</label>
    <input type="text" id="eventoNombre" placeholder="Ej. XV Años Pau">
    
    <label>Cantidad de Invitados</label>
    <input type="number" id="totalInvitados" placeholder="Ej. 150">
    
    <label>Cantidad de Mesas</label>
    <input type="number" id="totalMesas" placeholder="Ej. 15">
    
    <button onclick="guardarConfiguracion()">Ingresar al Panel</button>
</div>

<script>
const FIREBASE_URL = "https://xvpau-36eff-default-rtdb.firebaseio.com/configuracion.json";

// 1. FUNCIÓN PARA VALIDAR EL LOGIN LOCAL
function validarAcceso() {
    const usuario = document.getElementById('loginUsuario').value.trim();
    const contrasena = document.getElementById('loginPassword').value;

    if (usuario === "Administrador" && contrasena === "password") {
        // Ocultamos el login y mostramos el formulario de configuración
        document.getElementById('vistaLogin').classList.add('oculto');
        document.getElementById('vistaConfiguracion').classList.remove('oculto');
        
        // Ejecutamos la carga de datos de Firebase ahora que el usuario está adentro
        cargarDatosFirebase();
    } else {
        alert('Usuario o contraseña incorrectos. Intente de nuevo.');
    }
}

// Permitir dar "Enter" en el campo de contraseña para loguearse rápido
document.getElementById('loginPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') validarAcceso();
});


// 2. FUNCIÓN PARA INTENTAR PRELLENAR LOS CAMPOS DESDE EL CACHÉ O DESDE FIREBASE
async function cargarDatosFirebase() {
    // Primero intentamos jalar del almacenamiento local (es instantáneo)
    const localNombre = localStorage.getItem('eventoNombre_cache');
    const localInvitados = localStorage.getItem('totalInvitados_cache');
    const localMesas = localStorage.getItem('totalMesas_cache');

    if (localNombre) document.getElementById('eventoNombre').value = localNombre;
    if (localInvitados) document.getElementById('totalInvitados').value = localInvitados;
    if (localMesas) document.getElementById('totalMesas').value = localMesas;

    // Intentamos actualizar en segundo plano con lo que esté guardado en Firebase
    try {
        let response = await fetch(FIREBASE_URL);
        if (response.ok) {
            let data = await response.json();
            if (data) {
                if (data.evento) document.getElementById('eventoNombre').value = data.evento;
                if (data.maxInvitados) document.getElementById('totalInvitados').value = data.maxInvitados;
                if (data.maxMesas) document.getElementById('totalMesas').value = data.maxMesas;
            }
        }
    } catch (error) {
        console.warn("Firebase offline o bloqueado temporalmente. Usando datos locales:", error);
    }
}

// 3. FUNCIÓN PARA GUARDAR EN FIREBASE Y REDIRECCIONAR
async function guardarConfiguracion() {
    const nombre = document.getElementById('eventoNombre').value.trim();
    const invitados = document.getElementById('totalInvitados').value;
    const mesas = document.getElementById('totalMesas').value;

    if (!nombre || !invitados || !mesas) {
        return alert('Por favor, completa todos los campos.');
    }

    const data = {
        evento: nombre,
        maxInvitados: parseInt(invitados),
        maxMesas: parseInt(mesas)
    };

    // Guardar en LocalStorage obligatoriamente como respaldo de emergencia
    localStorage.setItem('eventoNombre_cache', nombre);
    localStorage.setItem('totalInvitados_cache', invitados);
    localStorage.setItem('totalMesas_cache', mesas);

    try {
        let response = await fetch(FIREBASE_URL, {
            method: 'PUT', 
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'application/json' }
        });

        if (response.ok) {
            window.location.href = "panel.html";
        } else {
            console.error('Error de respuesta en Firebase. Avanzando en modo local.');
            window.location.href = "panel.html";
        }
    } catch (error) {
        console.warn('Error de red. Avanzando al panel con almacenamiento local.');
        window.location.href = "panel.html";
    }
}
</script>
</body>
</html>
