<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Invitaciones</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Montserrat,sans-serif;}

body{
background:#f3f4f6;
padding:20px;
}

.container{max-width:900px;margin:auto;}

header{text-align:center;margin-bottom:20px;}

.layout{display:flex;gap:20px;flex-wrap:wrap;}

.card{
background:#fff;
padding:20px;
border-radius:12px;
flex:1;
min-width:300px;
}

label{
font-size: 13px;
font-weight: 600;
color: #4b5563;
display: block;
margin-top: 10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0 10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#25d366;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight: bold;
}

.ticket{
background:linear-gradient(135deg,#1e3a8a,#0f172a);
color:#fff;
padding:20px;
border-radius:16px;
text-align:center;
}

.qr{background:#fff;padding:10px;border-radius:10px;display:inline-block;margin-top:10px;}

.login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#f3f4f6;
}

.login-box{
background:#fff;
padding:25px;
border-radius:12px;
width:300px;
}
</style>
</head>

<body>

<div id="login" class="login">
<div class="login-box">
<h3>Acceso</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<p id="error" style="color:red"></p>
</div>
</div>

<div id="panel" class="container" style="display:none">

<header>
<h2>Panel de Invitaciones</h2>
</header>

<div class="layout">

<div class="card">
<h3>Datos</h3>

<p style="font-weight: bold; color: #2563eb;">Lugares Disponibles: <span id="lugares">200</span></p>

<label>Familia / Invitado:</label>
<input id="nombre" placeholder="Ej. Familia Hernández García" oninput="update()">

<label>Número de pases / lugares:</label>
<input id="pases" type="number" oninput="update()" value="1" min="1">

<label>Mesa asignada:</label>
<input id="mesa" oninput="update()" value="Mesa 1">

<label>WhatsApp (Sin signos ni espacios):</label>
<input id="tel" placeholder="521...">

<label>Vista previa del mensaje:</label>
<textarea id="msg" rows="10"></textarea>

<button onclick="send()"><i class="fab fa-whatsapp"></i> Enviar WhatsApp</button>
</div>

<div class="card ticket">
<h3>Pase Digital</h3>
<br>
<p>Invitación para:</p>
<h2 id="tNombre" style="color: #f59e0b; margin: 10px 0;">Invitado</h2>
<p>Lugares: <strong id="tPases">1</strong></p>
<p>Asiento: <strong id="tMesa">Mesa 1</strong></p>

<div class="qr">
<div id="qrcode"></div>
</div>

</div>

</div>
</div>

<script>

const USER="administrador";
const PASS="XVPau";
const TOTAL=200;

/* LOGIN */
function login(){
const u=document.getElementById("user").value.trim();
const p=document.getElementById("pass").value.trim();

if(u===USER && p===PASS){
sessionStorage.setItem("ok","1");
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
init();
}else{
document.getElementById("error").innerText="Error de acceso";
}
}

/* INIT */
function init(){
if(!localStorage.getItem("lugares")){
localStorage.setItem("lugares",TOTAL);
}
mostrar();
update();
}

/* ON LOAD */
window.onload=function(){

const url=new URLSearchParams(location.search);

if(url.get("invitado")){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

document.getElementById("nombre").value=url.get("invitado");
document.getElementById("pases").value=url.get("pases");
document.getElementById("mesa").value=url.get("mesa")||"General";

init();
return;
}

if(sessionStorage.getItem("ok")===="1"){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
init();
}
};

/* LUGARES */
function mostrar(){
let l=localStorage.getItem("lugares");
if(!l){l=TOTAL;localStorage.setItem("lugares",TOTAL);}
document.getElementById("lugares").innerText=l;
}

/* UPDATE */
function update(){

let n=document.getElementById("nombre").value || "Invitado";
let p=document.getElementById("pases").value || "1";
let m=document.getElementById("mesa").value || "Mesa 1";

document.getElementById("tNombre").innerText=n;
document.getElementById("tPases").innerText=p;
document.getElementById("tMesa").innerText=m;

try{
let url="https://wa.me/521000000000?text="+encodeURIComponent(n+" "+p+" "+m);

document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"), {
    text: url,
    width: 128,
    height: 128
});

}catch(e){
console.log(e);
}

/* AQUÍ SE CONSTRUYE EL MENSAJE DINÁMICO EN TIEMPO REAL */
document.getElementById("msg").value = 
`✨ ¡Tenemos una invitación muy especial para ti! ✨

Estimada familia / amigo *${n}*,

Nos complace enormemente invitarte a compartir con nosotros un momento inolvidable. En el siguiente enlace podrás conocer todos los detalles de nuestro evento, itinerario y locación:

👉 Nuestra Invitación Digital:
https://barrientosmtzluis-jpg.github.io/XV-ANAPAU/

🎫 De igual manera, te hacemos llegar tu Pase Digital Inteligente válido para *${p}* personas.
📍 Mesa asignada: *${m}*

Para ingresar de forma ágil el día del evento, solo haz clic aquí abajo y presenta el código QR desde tu pantalla:

👉 Tu Boleto de Acceso:
https://barrientosmtzluis-jpg.github.io/boletos/?invitado=${encodeURIComponent(n)}&pases=${p}&mesa=${encodeURIComponent(m)}

¡Tu presencia hará que este día sea aún más especial! Esperamos contar contigo. ✨🥂`;
}

/* SEND */
function send(){

let tel=document.getElementById("tel").value.trim();
let p=parseInt(document.getElementById("pases").value) || 0;
let l=parseInt(localStorage.getItem("lugares"));

if(!tel){
    alert("Por favor, introduce un número de teléfono válido.");
    return;
}

if(l-p<0){
    if(!confirm("No hay suficientes lugares disponibles. ¿Deseas continuar?")) return;
}

localStorage.setItem("lugares", l-p);
mostrar();

/* OBTENEMOS EL TEXTO DIRECTAMENTE DE LA CAJA DE TEXTO ACTUALIZADA */
let msg = document.getElementById("msg").value;

/* API MODERNA DE WHATSAPP WEB / MÓVIL */
window.open(
`https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msg)}`, 
'_blank'
);

}

</script>

</body>
</html>
